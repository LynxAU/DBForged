{% extends "webclient/webclient.html" %}
{% load static %}

{% block scripts %}
{{ block.super }}
<script type="text/javascript" src="{% static 'webclient/js/dbforged_canvas_demo.js' %}?v=5"></script>
<script type="text/javascript">
  (function () {
    "use strict";

    try {
      document.title = "DBForged";
    } catch (_err) { }

    var WELCOME_MARKERS = [
      "welcome to",
      "version",
      "team tartarus",
      "connect <username>",
      "create <username>",
    ];

    function htmlToText(html) {
      var tmp = document.createElement("div");
      tmp.innerHTML = html || "";
      return (tmp.textContent || tmp.innerText || "").trim();
    }

    function safeJsonParse(text) {
      try { return JSON.parse(text); } catch (_err) { return null; }
    }

    function ensureScouterHud() {
      if (document.getElementById("dbforged-scouter-hud")) {
        return document.getElementById("dbforged-scouter-hud");
      }

      var host = document.querySelector("#main-sub") || document.querySelector("#main") || document.body;
      if (!host) return null;
      if (host !== document.body && getComputedStyle(host).position === "static") {
        host.style.position = "relative";
      }

      var hud = document.createElement("div");
      hud.id = "dbforged-scouter-hud";
      // DBZ Scouter aesthetic: Glassmorphic green filter, scanlines, and glowing data
      hud.style.cssText = [
        "position:absolute",
        "top:12px",
        "right:12px",
        "z-index:30",
        "pointer-events:none",
        "width:min(340px, calc(100% - 24px))",
        "background:linear-gradient(135deg, rgba(8,35,16,0.7), rgba(0,18,6,0.85))",
        "backdrop-filter:blur(8px)",
        "-webkit-backdrop-filter:blur(8px)",
        "border:1px solid rgba(80,255,110,0.5)",
        "border-radius:12px",
        "box-shadow:0 0 20px rgba(10,255,80,0.15), inset 0 0 15px rgba(50,255,100,0.1)",
        "color:#ccffda",
        "font:13px/1.3 'Inter', 'Roboto', 'Courier New', sans-serif",
        "padding:12px 14px",
        "display:none",
        "overflow:hidden"
      ].join(";");

      hud.innerHTML = [
        "<!-- Scanline overlay -->",
        "<div style='position:absolute;inset:0;background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(150,255,150,0.03) 2px, rgba(150,255,150,0.03) 4px);pointer-events:none;'></div>",
        "<!-- Content -->",
        "<div style='position:relative;z-index:1;'>",
        "  <div style='display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;border-bottom:1px solid rgba(100,255,120,0.3);padding-bottom:4px;'>",
        "    <div id='dbf-hud-name' style='font-weight:900;font-size:15px;color:#f0fff4;text-transform:uppercase;letter-spacing:1px;text-shadow:0 0 5px rgba(100,255,120,0.6);'>SCOUTER_LINK</div>",
        "    <div id='dbf-hud-pl' style='font-weight:bold;color:#a3ffc2;font-size:14px;text-shadow:0 0 8px rgba(50,255,100,0.5);'>PL: ERR</div>",
        "  </div>",
        "  <div style='margin-bottom:8px;'>",
        "    <div style='display:flex;justify-content:space-between;font-size:11px;font-weight:bold;margin-bottom:3px;color:#a8ffc4;'><span>HP</span><span id='dbf-hud-hp-text'>0/0</span></div>",
        "    <div style='height:8px;background:rgba(0,0,0,0.5);border:1px solid rgba(100,255,120,0.2);border-radius:4px;overflow:hidden;'>",
        "      <div id='dbf-hud-hp-bar' style='height:100%;width:0%;background:linear-gradient(90deg,#24d15d,#6dff9e);box-shadow:0 0 10px rgba(80,255,120,0.8);transition:width 0.3s ease-out;'></div>",
        "    </div>",
        "  </div>",
        "  <div>",
        "    <div style='display:flex;justify-content:space-between;font-size:11px;font-weight:bold;margin-bottom:3px;color:#b3fbff;'><span>KI</span><span id='dbf-hud-ki-text'>0/0</span></div>",
        "    <div style='height:8px;background:rgba(0,0,0,0.5);border:1px solid rgba(100,220,255,0.2);border-radius:4px;overflow:hidden;'>",
        "      <div id='dbf-hud-ki-bar' style='height:100%;width:0%;background:linear-gradient(90deg,#00aeff,#80ddff);box-shadow:0 0 10px rgba(0,180,255,0.8);transition:width 0.3s ease-out;'></div>",
        "    </div>",
        "  </div>",
        "</div>"
      ].join("");

      host.appendChild(hud);
      return hud;
    }

    function ensurePlayerPanel() {
      if (document.getElementById("dbforged-player-panel")) {
        return document.getElementById("dbforged-player-panel");
      }

      var host = document.querySelector("#main-sub") || document.querySelector("#main") || document.body;
      if (!host) return null;
      if (host !== document.body && getComputedStyle(host).position === "static") {
        host.style.position = "relative";
      }

      var panel = document.createElement("div");
      panel.id = "dbforged-player-panel";
      // Capsule Corp Aesthetic: Slate blue/white tech card
      panel.style.cssText = [
        "position:absolute",
        "top:12px",
        "left:12px",
        "z-index:30",
        "pointer-events:none",
        "width:min(300px, calc(100% - 24px))",
        "background:linear-gradient(145deg, rgba(15,25,35,0.85), rgba(5,10,15,0.95))",
        "backdrop-filter:blur(10px)",
        "-webkit-backdrop-filter:blur(10px)",
        "border:1px solid rgba(100,180,255,0.4)",
        "border-left:4px solid #00aeff",
        "border-radius:6px 12px 12px 6px",
        "box-shadow:0 8px 32px rgba(0,0,0,0.5)",
        "color:#d4e6f1",
        "font:12px/1.4 'Inter', 'Roboto', 'Segoe UI', sans-serif",
        "padding:12px 16px",
        "display:none"
      ].join(";");

      panel.innerHTML = [
        "<div style='display:flex;align-items:center;margin-bottom:10px;'>",
        "  <div style='flex-grow:1;font-weight:800;font-size:14px;color:#ffffff;letter-spacing:1px;text-transform:uppercase;'>System Identity</div>",
        "  <div style='font-size:10px;color:#00aeff;border:1px solid #00aeff;padding:2px 4px;border-radius:3px;background:rgba(0,174,255,0.1);'>ACTIVE</div>",
        "</div>",
        "<div id='dbf-player-panel-lines' style='display:grid;grid-template-columns:35% 65%;gap:4px 8px;font-size:11px;'></div>"
      ].join("");

      host.appendChild(panel);
      return panel;
    }

    function pct(cur, max) {
      var c = Number(cur || 0);
      var m = Math.max(1, Number(max || 1));
      return Math.max(0, Math.min(100, (c / m) * 100));
    }

    function updateScouterHud(entity) {
      if (!entity) return;
      var hud = ensureScouterHud();
      if (!hud) return;

      var nameEl = document.getElementById("dbf-hud-name");
      var plEl = document.getElementById("dbf-hud-pl");
      var hpText = document.getElementById("dbf-hud-hp-text");
      var hpBar = document.getElementById("dbf-hud-hp-bar");
      var kiText = document.getElementById("dbf-hud-ki-text");
      var kiBar = document.getElementById("dbf-hud-ki-bar");

      if (nameEl) nameEl.textContent = (entity.name || "Player") + " SCOUTER";
      if (plEl) plEl.textContent = "PL: " + String(entity.displayed_pl ?? entity.pl ?? "--");
      if (hpText) hpText.textContent = String(entity.hp ?? 0) + "/" + String(entity.hp_max ?? 0);
      if (kiText) kiText.textContent = String(entity.ki ?? 0) + "/" + String(entity.ki_max ?? 0);
      if (hpBar) hpBar.style.width = pct(entity.hp, entity.hp_max).toFixed(1) + "%";
      if (kiBar) kiBar.style.width = pct(entity.ki, entity.ki_max).toFixed(1) + "%";

      hud.style.display = "block";
    }

    function setPanelRows(el, rows) {
      if (!el) return;
      el.innerHTML = rows.map(function (row) {
        return [
          "<span style='color:#ffcf84;'>", row[0], "</span>",
          "<span style='color:#fff4df;'>", escapeHtml(row[1]), "</span>"
        ].join("");
      }).join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function prettyValue(v, fallback) {
      if (v == null || v === "") return fallback || "--";
      return String(v).replace(/_/g, " ");
    }

    function updatePlayerPanel(entity) {
      if (!entity) return;
      var panel = ensurePlayerPanel();
      if (!panel) return;

      var lines = document.getElementById("dbf-player-panel-lines");
      var appearance = entity.appearance || {};
      setPanelRows(lines, [
        ["Name", prettyValue(entity.name)],
        ["Race", prettyValue(entity.race || appearance.race)],
        ["Sex", prettyValue(entity.sex || appearance.sex)],
        ["Hair", prettyValue(appearance.hair_style)],
        ["HairColor", prettyValue(appearance.hair_color)],
        ["Eyes", prettyValue(appearance.eye_color)],
        ["Aura", prettyValue(appearance.aura_color)],
        ["Sprite", prettyValue(entity.sprite_id)],
        ["Room", prettyValue(entity.room_name)],
      ]);

      panel.style.display = "block";
    }

    function routeEventPacket(packet) {
      if (!packet) return;
      if ((packet.type === "player_frame" || packet.type === "entity_delta") && packet.entity) {
        updateScouterHud(packet.entity); // HUD remains stats-only (HP/KI/PL)
        updatePlayerPanel(packet.entity); // Appearance/details belong in player panel
      }
    }

    // Legacy MutationObservers and regex-text sniffers removed in favor of native OOB websockets

    function looksLikeWelcome(html) {
      var t = htmlToText(html).toLowerCase();
      return WELCOME_MARKERS.every(function (m) { return t.includes(m); });
    }

    function ensureLogo(messageWindow) {
      if (document.getElementById("dbforged-message-logo")) return;
      var wrap = document.createElement("div");
      wrap.id = "dbforged-message-logo";
      wrap.style.cssText = "padding:10px 8px 6px;background:#000;";

      var img = document.createElement("img");
      img.src = "{% static 'ui/dbforgedfullcoloralpha.png' %}?v=20260222-1736";
      img.alt = "Dragonball Forged";
      img.style.cssText = [
        "display:block",
        "max-width:min(900px,96%)",
        "height:auto",
        "margin:0 auto",
        "filter:drop-shadow(0 2px 8px rgba(0,0,0,0.65))"
      ].join(";");

      wrap.appendChild(img);
      messageWindow.prepend(wrap);
    }

    function renderWelcomeBlock(messageWindow, html, cls) {
      if (document.getElementById("dbforged-welcome-block")) return;
      ensureLogo(messageWindow);

      var block = document.createElement("div");
      block.id = "dbforged-welcome-block";
      block.className = cls || "out";
      block.style.cssText = [
        "margin:0 auto 12px",
        "max-width:min(900px,96%)",
        "text-align:center",
        "background:#000",
        "padding:8px 12px 12px"
      ].join(";");

      // Preserve Evennia color markup already converted to HTML.
      block.innerHTML = html;
      messageWindow.appendChild(block);
      return block;
    }

    function bootstrapExistingWelcome(messageWindow) {
      if (!messageWindow || document.getElementById("dbforged-welcome-block")) return;
      var best = null;
      var bestLen = Infinity;
      messageWindow.querySelectorAll("div").forEach(function (el) {
        if (!(el instanceof HTMLElement)) return;
        if (el.id === "dbforged-message-logo" || el.id === "dbforged-welcome-block") return;
        var html = el.innerHTML || "";
        if (!looksLikeWelcome(html)) return;
        var len = (el.textContent || "").length;
        if (len < bestLen) {
          bestLen = len;
          best = el;
        }
      });
      if (!best) return;
      renderWelcomeBlock(messageWindow, best.innerHTML || "", best.className || "out");
      best.style.display = "none";
    }

    function installWelcomeOutputOverride() {
      if (!window.plugins || !window.plugins.defaultout || !window.$) {
        setTimeout(installWelcomeOutputOverride, 300);
        return;
      }
      if (window.plugins.defaultout.__dbforgedWrapped) return;

      var originalOnText = window.plugins.defaultout.onText;
      if (typeof originalOnText !== "function") return;

      // Insert the logo immediately for already-rendered welcome screens.
      var existingWindow = $("#messagewindow");
      if (existingWindow.length) {
        ensureLogo(existingWindow[0]);
        bootstrapExistingWelcome(existingWindow[0]);
      }

      window.plugins.defaultout.onText = function (args, kwargs) {
        var html = (args && args[0]) || "";

        var mwin = $("#messagewindow");
        if (!mwin.length) {
          return originalOnText(args, kwargs);
        }

        // Legacy interceptor removed

        if (args && args.length) {
          args = Array.prototype.slice.call(args);
          args[0] = html;
        } else {
          args = [html];
        }

        // Evennia EvMenu sends ANSI clear screen codes: ESC[2J ESC[H
        // The webclient doesn't natively support clearing the DOM this way,
        // so it renders the escape characters as blank boxes and duplicates the menu.
        // We intercept those sequences here, manually clear the DOM, and strip the codes.
        if (typeof html === "string") {
          var plainText = $("<div/>").html(html).text();
          if (plainText.indexOf("[2J") !== -1 && plainText.indexOf("[H") !== -1) {
            mwin.empty(); // Nuke the massive duplicated DOM history!

            var hIndex = html.lastIndexOf("[H");
            if (hIndex !== -1) {
              var newHtml = html.substring(hIndex + 2);
              // Clean up any dangling span closures left behind by Evennia's ANSI-to-HTML wrapper
              newHtml = newHtml.replace(/^\s*<\/span>\s*/, "");
              html = newHtml;
              if (args[0]) args[0] = html;
            }
          }
        }

        ensureLogo(mwin[0]);

        if (looksLikeWelcome(html)) {
          renderWelcomeBlock(mwin[0], html, kwargs == null ? "out" : kwargs["cls"]);
          var scrollHeight = mwin.parent().parent().prop("scrollHeight");
          mwin.parent().parent().animate({ scrollTop: scrollHeight }, 0);
          return true;
        }

        return originalOnText(args, kwargs);
      };

      window.plugins.defaultout.__dbforgedWrapped = true;
    }

    function bindOOBEvents() {
      if (!window.Evennia || !window.Evennia.emitter) {
        setTimeout(bindOOBEvents, 300);
        return;
      }
      window.Evennia.emitter.on("dbforged_event", function (args, kwargs) {
        var pkt = (args && args.length > 0) ? args[0] : kwargs;
        routeEventPacket(pkt);
      });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () {
        installWelcomeOutputOverride();
        bindOOBEvents();
      }, { once: true });
    } else {
      installWelcomeOutputOverride();
      bindOOBEvents();
    }
  })();
</script>
{% endblock %}
